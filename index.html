<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mừng Thôi Nôi Bé Bông</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #fff0f3; min-height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Hiệu ứng hạt lấp lánh (Sparkles) giống LoveCard */
        #sparkle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; display: none; }

        /* MÀN HÌNH MỞ ĐẦU: PHONG THƯ HOÀNG GIA */
        #envelope-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1s cubic-bezier(0.77, 0, 0.175, 1); }
        .envelope-wrapper { position: relative; cursor: pointer; animation: float 2.5s ease-in-out infinite; }
        .envelope { width: 150px; height: 150px; background: #ffffff; border-radius: 35px; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 40px rgba(216, 27, 96, 0.2); border: 4px solid #fff; }
        .heart-badge { position: absolute; font-size: 40px; top: 50%; left: 50%; transform: translate(-50%, -40%); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        .envelope-text { margin-top: 30px; color: #ffffff; font-weight: bold; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 2px 6px rgba(0,0,0,0.1); animation: pulse 1.5s infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } }

        /* CONTAINER CHÍNH CHUẨN PREMIUM */
        .main-card { width: 100%; max-width: 430px; background: #ffffff; height: 100vh; overflow-y: auto; position: relative; z-index: 10; box-shadow: 0 0 40px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        /* Khung hoa văn viền góc đặc trưng */
        .card-border-decor { position: absolute; width: 100%; height: 100%; pointer-events: none; border: 15px solid transparent; border-image: url('https://i.postimg.cc/0jXyZp3k/border.png') 30 round; opacity: 0.3; z-index: 11; }

        /* Phần Header Ảnh Bé */
        .hero-holder { width: 100%; padding: 25px 25px 0 25px; position: relative; }
        .hero-img { width: 100%; height: 340px; object-fit: cover; border-radius: 30px; border: 8px solid #fff; box-shadow: 0 10px 30px rgba(255, 92, 138, 0.12); }
        
        .baby-title { font-size: 26px; color: #c2185b; font-weight: 800; margin-top: 25px; text-transform: uppercase; letter-spacing: 0.5px; }
        .baby-subtitle { font-size: 14px; color: #888; font-style: italic; margin-bottom: 20px; }

        /* Hộp Thông Tin Tiệc Sang Trọng */
        .luxury-info-box { width: calc(100% - 50px); background: #fffafb; border-radius: 28px; padding: 30px 20px; box-shadow: 0 10px 35px rgba(255, 92, 138, 0.04); border: 1.5px dashed #ffb6c1; margin-bottom: 25px; text-align: center; position: relative; }
        .invitation-line { font-size: 14px; color: #ff5c8a; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        .time-big { font-size: 38px; color: #d81b60; font-weight: 900; }
        .date-full { font-size: 16px; color: #333; font-weight: 600; margin-top: 5px; margin-bottom: 20px; }
        .line-deco { width: 60px; height: 2px; background: #ffe4e8; margin: 0 auto 20px; }
        .venue-title { font-size: 12px; color: #999; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .venue-detail { font-size: 16px; color: #222; font-weight: 700; margin-top: 6px; line-height: 1.5; }
        
        .maps-btn { display: inline-block; background: #2196f3; color: #ffffff; text-decoration: none; padding: 14px 40px; border-radius: 50px; font-weight: 700; font-size: 13px; box-shadow: 0 6px 20px rgba(33, 150, 243, 0.3); margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        
        /* Album Ảnh Chân Trang */
        .gallery-wrapper { width: calc(100% - 50px); margin-top: 10px; }
        .gallery-title { font-size: 14px; color: #ff5c8a; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 15px; text-align: left; padding-left: 5px; }
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .gallery-item { background: #fff; padding: 6px; border-radius: 20px; box-shadow: 0 6px 16px rgba(0,0,0,0.02); border: 1px solid #ffeef1; }
        .gallery-item img { width: 100%; height: 145px; object-fit: cover; border-radius: 14px; }

        /* Nút Điều Khiển Âm Nhạc Tròn */
        #music-controller { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: #ff5c8a; color: #fff; border-radius: 50%; display: none; justify-content: center; align-items: center; z-index: 50; box-shadow: 0 6px 20px rgba(255,92,138,0.35); cursor: pointer; font-size: 20px; }
        .rotate-effect { animation: spinMe 4s linear infinite; }
        @keyframes spinMe { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="envelope-screen" onclick="openLuxuryCard()">
        <div class="envelope-wrapper">
            <div class="envelope">
                <span style="font-size: 60px; opacity: 0.15;">✉</span>
            </div>
            <div class="heart-badge">💖</div>
        </div>
        <div class="envelope-text">Chạm để nhận thiệp</div>
    </div>

    <canvas id="sparkle-canvas"></canvas>

    <div class="main-card">
        <div class="card-border-decor"></div>

        <div class="hero-holder">
            <img src="https://picsum.photos/id/1067/600/400" class="hero-img" alt="Bé Bông">
        </div>
        
        <div class="baby-title">Đinh Ngọc Minh Châu</div>
        <div class="baby-subtitle">(Bé Bông Tròn 1 Tuổi)</div>

        <div class="luxury-info-box">
            <div class="invitation-line">✨ Trân trọng kính mời ✨</div>
            <div class="time-big">11:30 Trưa</div>
            <div class="date-full">Chủ Nhật, Ngày 28 Tháng 06 Năm 2026</div>
            <div class="line-deco"></div>
            <div class="venue-title">📍 TỔ CHỨC TẠI TƯ GIA</div>
            <div class="venue-detail">Tổ 1 Bồng Lai, Hiệp Thạnh, Đức Trọng, Lâm Đồng</div>
            <a href="http://googleusercontent.com/maps.google.com/6" target="_blank" class="maps-btn">🗺️ Chỉ đường qua Google Maps</a>
        </div>

        <div class="gallery-wrapper">
            <div class="gallery-title">📸 Nhật ký lớn khôn của con</div>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://picsum.photos/id/823/300/300" alt="Bé Bông ngủ ngon">
                </div>
                <div class="gallery-item">
                    <img src="https://picsum.photos/id/64/300/300" alt="Bé Bông cười tươi">
                </div>
            </div>
        </div>
    </div>

    <div id="music-controller" class="rotate-effect" onclick="handleMusic()">🎵</div>

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        var myTrack = document.getElementById('bg-audio');
        var mIcon = document.getElementById('music-controller');
        var canvas = document.getElementById('sparkle-canvas');

        function openLuxuryCard() {
            // Hiệu ứng biến mất mượt mà của bao thư
            document.getElementById('envelope-screen').style.opacity = '0';
            document.getElementById('envelope-screen').style.transform = 'scale(0.9) translateY(-30px)';
            
            setTimeout(() => {
                document.getElementById('envelope-screen').style.display = 'none';
                canvas.style.display = 'block';
                mIcon.style.display = 'flex';
                myTrack.play().catch(e => console.log("Hệ thống kích hoạt âm thanh"));
            }, 800);
        }

        function handleMusic() {
            if (myTrack.paused) {
                myTrack.play();
                mIcon.classList.add('rotate-effect');
            } else {
                myTrack.pause();
                mIcon.classList.remove('rotate-effect');
            }
        }

        // Tạo hiệu ứng hạt lấp lánh (Sparkle particles) nhẹ nhàng
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function initSize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initSize);
        initSize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h + h;
                this.size = Math.random() * 2 + 1;
                this.speedY = Math.random() * -0.7 - 0.3;
                this.alpha = Math.random() * 0.6 + 0.2;
                this.fade = Math.random() * 0.005 + 0.002;
            }
            update() {
                this.y += this.speedY;
                this.alpha -= this.fade;
                if (this.y < 0 || this.alpha <= 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 182, 193, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
